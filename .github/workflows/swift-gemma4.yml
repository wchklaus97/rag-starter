name: Swift Gemma4 Sample Compile

on:
  push:
    branches: ["main"]
    paths:
      - 'swift-gemma4-sample/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'swift-gemma4-sample/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      # We just compile and run pure logic tests.
      # We do NOT run `swift run gemma4-sample` to avoid 1.5GB model downloads.
      - name: Build
        working-directory: ./swift-gemma4-sample
        run: swift build -c release
        
      - name: Run Tests
        working-directory: ./swift-gemma4-sample
        run: swift test
