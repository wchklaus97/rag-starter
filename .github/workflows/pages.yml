# Build-free GitHub Pages: upload the standalone /rag_model_site static site.
# Prerequisite (once per repo): Settings → Pages → Build and deployment → Source: GitHub Actions.
# Otherwise configure-pages fails with "Get Pages site failed".
name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rag_model_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
