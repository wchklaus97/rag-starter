name: Rust Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v0.1.0)

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rag-starter-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rag-starter-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rag-starter-macos-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/rag-starter.exe dist/${{ matrix.artifact_name }}.exe
          else
            cp target/${{ matrix.target }}/release/rag-starter dist/${{ matrix.artifact_name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
